<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Grade Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Student Grade Tracker</h1>

  <!-- Form to add student -->
  <div id="add-student-form">
    <input type="text" id="student-name" placeholder="Student Name">
    <input type="number" id="student-grade" placeholder="Grade">
    <button id="add-student-btn">Add Student</button>
  </div>

  <!-- Table to show students -->
  <table id="student-table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Grades</th>
        <th>Average</th>
      </tr>
    </thead>
    <tbody>
      <!-- Students will appear here -->
    </tbody>
  </table>

  <script src="script.js"></script>
</body>
</html>
